name: Build Mobile Apps

on:
  push:
    branches: ["main"]
    paths:
      - "vibezen/app.json"
      - "vibezen/eas.json"
      - "vibezen/package.json"
      - "vibezen/package-lock.json"
      - "vibezen/assets/**"
      - ".github/workflows/deploy-expo.yml"
  workflow_dispatch:

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: vibezen/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: vibezen

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > vibezen/google-services.json

      - name: Stage google-services.json for EAS Build
        # EAS Build only uploads git-tracked files. The file is gitignored
        # locally, so we force-add it and commit it in a throwaway commit
        # that is never pushed back to the repository.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f vibezen/google-services.json
          git commit -m "local throw away commit: add google-services.json for EAS Build" --no-verify

      - name: Build (preview)
        run: eas build --profile preview --platform android --non-interactive
        working-directory: vibezen
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  ios:
    name: Build iOS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: vibezen/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: vibezen

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build (preview)
        run: eas build --profile preview --platform ios --non-interactive
        working-directory: vibezen
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
