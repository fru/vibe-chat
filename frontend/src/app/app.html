<mat-sidenav-container class="app-container">
  <mat-sidenav mode="side" opened class="app-sidenav">
    <mat-nav-list>
      <view-main-menu-item
        label="Nachrichten"
        link="/messages"
        icon="message"
        [badge]="openMessageCount"
      />
      <view-main-menu-group label="Filter">
        <view-main-menu-item label="Zimmer" link="/filter/rooms" icon="meeting_room" />
        <view-main-menu-item label="Arbeitsablauf" link="/filter/workflow" icon="account_tree" />
      </view-main-menu-group>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <view-toolbar />
    <div class="app-outlet">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
