<mat-sidenav-container class="app-container">
  <mat-sidenav mode="side" opened class="app-sidenav">
    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/messages"
        routerLinkActive="app-menu-item-active"
        [matBadge]="openMessageCount"
        matBadgeColor="warn"
        matBadgePosition="above after"
        matBadgeSize="small"
      >
        <mat-icon matListItemIcon>message</mat-icon>
        <span matListItemTitle>Messages</span>
      </a>

      <mat-expansion-panel class="app-expansion" [expanded]="true">
        <mat-expansion-panel-header>
          <mat-panel-title>
            <mat-icon class="app-expansion-icon">more_horiz</mat-icon>
            <span class="app-expansion-title">Other</span>
          </mat-panel-title>
        </mat-expansion-panel-header>

        @for (item of otherChildren; track item.link) {
          <a
            mat-list-item
            [routerLink]="item.link"
            routerLinkActive="app-menu-item-active"
            class="app-sub-item"
          >
            <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
            <span matListItemTitle>{{ item.label }}</span>
          </a>
        }
      </mat-expansion-panel>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <mat-toolbar color="primary" class="app-toolbar">
      <button mat-icon-button aria-label="Back">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <span>Geräteverwaltung</span>
      <span class="app-toolbar-spacer"></span>
      <button mat-icon-button aria-label="Search">
        <mat-icon>search</mat-icon>
      </button>
    </mat-toolbar>
    <div class="app-outlet">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
